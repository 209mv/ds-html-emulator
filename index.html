<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>mauricio's cool hub i guess</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
  background: black;
}

/* Canvas sits behind everything */
#space {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* UI layer */
header {
  text-align: center;
  font-size: 28px;
  padding: 20px;
  text-transform: lowercase;
}

.announcements {
  max-width: 800px;
  margin: auto;
  background: rgba(20,20,20,0.7);
  padding: 15px;
  border-radius: 10px;
  backdrop-filter: blur(5px);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  max-width: 900px;
  margin: 30px auto;
  padding: 10px;
}

.card {
  background: rgba(30,30,30,0.8);
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
  background: rgba(50,50,50,0.9);
}
</style>
</head>

<body>

<canvas id="space"></canvas>

<header>mauricio's cool hub i guess</header>

<div class="announcements">
  📢 ds emulator is now available
</div>

<div class="grid">

  <div class="card" onclick="location.href='emulators.html'">
    🧩 emulators
  </div>

  <div class="card" onclick="location.href='games/index.html'">
    🎯 games
  </div>

  <div class="card" onclick="location.href='chat.html'">
    💬 chat
  </div>

</div>

<script>
// Simple starfield (lightweight, no libraries)
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

let stars = [];
let w, h;

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;

  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * w,
      y: Math.random() * h,
      z: Math.random() * 2 + 0.5
    });
  }
}

function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, w, h);

  ctx.fillStyle = "white";

  for (let s of stars) {
    s.y += s.z * 0.3;

    if (s.y > h) {
      s.y = 0;
      s.x = Math.random() * w;
    }

    ctx.fillRect(s.x, s.y, s.z, s.z);
  }

  requestAnimationFrame(draw);
}

window.addEventListener("resize", resize);

resize();
draw();
</script>

</body>
</html>
