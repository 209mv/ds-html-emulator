<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DS Emulator</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #game {
      width: 100%;
      height: 100%;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 9999;
      color: white;
      font-family: sans-serif;
    }
  </style>
</head>

<body>

<div id="ui">
  <input type="file" id="romInput" accept=".nds">
</div>

<div id="game"></div>

<script>
let loaded = false;

document.getElementById("romInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function() {

    document.getElementById("game").innerHTML = "";

    window.EJS_player = "#game";
    window.EJS_core = "nds";
    window.EJS_pathtodata = "emulatorjs/data/";
    window.EJS_gameUrl = reader.result; // local file only

    if (loaded) {
      const old = document.querySelector("script[data-ejs]");
      if (old) old.remove();
    }

    const script = document.createElement("script");
    script.src = "emulatorjs/data/loader.js";
    script.setAttribute("data-ejs", "1");
    document.body.appendChild(script);

    loaded = true;
  };

  reader.readAsDataURL(file);
});
</script>

</body>
</html>
