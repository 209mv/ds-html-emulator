<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DS Emulator</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      color: white;
      font-family: sans-serif;
    }

    #game {
      width: 100%;
      height: 100%;
    }

    #status {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 9999;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div id="status">Loading...</div>
<div id="game"></div>

<script>
console.log("Booting EmulatorJS...");

window.EJS_player = "#game";
window.EJS_core = "nds";
window.EJS_pathtodata = "emulatorjs/data/";

// ⚠️ MUST EXIST OR IT WILL HANG
window.EJS_gameUrl = "emulatorjs/data/game.nds";

window.addEventListener("load", () => {
  const script = document.createElement("script");
  script.src = "emulatorjs/data/loader.js";

  script.onload = () => {
    document.getElementById("status").innerText = "Emulator loaded";
  };

  script.onerror = () => {
    document.getElementById("status").innerText = "ERROR: loader.js failed";
    console.error("loader.js failed to load");
  };

  document.body.appendChild(script);
});
</script>

</body>
</html>
