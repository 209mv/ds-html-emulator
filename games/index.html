<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>games</title>

<link rel="stylesheet" href="../space.css">

<style>
html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  overflow-y: auto;
  font-family: Arial, sans-serif;
  color: white;
}

/* star background */
#space {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  pointer-events: none;
}

/* header */
header {
  text-align: center;
  font-size: 28px;
  padding: 20px;
  text-transform: lowercase;
}

/* search bar */
#search {
  display: block;
  margin: 0 auto;
  width: 60%;
  max-width: 400px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 16px;
}

/* grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  max-width: 900px;
  margin: 30px auto;
  padding: 10px;
}

/* game card */
.card {
  background: rgba(30,30,30,0.85);
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
  overflow: hidden;
}

.card:hover {
  transform: scale(1.05);
  background: rgba(50,50,50,0.9);
}

/* thumbnail */
.thumb {
  width: 100%;
  height: 100px;
  object-fit: cover;
  border-radius: 8px;
  margin-bottom: 8px;
  background: #111;
}

/* fallback icon */
.fallback {
  width: 100%;
  height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #222;
  border-radius: 8px;
  margin-bottom: 8px;
  font-size: 30px;
}
</style>
</head>

<body>

<canvas id="space"></canvas>

<header>games</header>

<input id="search" placeholder="search games...">

<div class="grid" id="grid"></div>

<script src="../space.js"></script>
<script src="manifest.js"></script>

<script>
const grid = document.getElementById("grid");
const search = document.getElementById("search");

/* =========================
   RENDER GAMES
========================= */
function render(filter = "") {
  grid.innerHTML = "";

  window.GAME_LIST
    .filter(g => g.title.toLowerCase().includes(filter.toLowerCase()))
    .forEach(game => {

      const card = document.createElement("div");
      card.className = "card";

      /* thumbnail logic */
      const img = document.createElement("img");
      img.className = "thumb";

      // tries auto thumbnail based on file name
      img.src = `thumbs/${game.file.replace(".html","")}.png`;

      img.onerror = () => {
        img.remove();

        const fallback = document.createElement("div");
        fallback.className = "fallback";
        fallback.textContent = "🎮";

        card.prepend(fallback);
      };

      const title = document.createElement("div");
      title.textContent = game.title;

      card.appendChild(img);
      card.appendChild(title);

      card.onclick = () => location.href = game.file;

      grid.appendChild(card);
    });
}

/* search filter */
search.addEventListener("input", (e) => {
  render(e.target.value);
});

/* initial load */
render();
</script>

</body>
</html>
