<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>games</title>

<link rel="stylesheet" href="../space.css">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
  background: black;
}

/* star canvas layer */
#space {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* header */
header {
  text-align: center;
  font-size: 28px;
  padding: 20px;
  text-transform: lowercase;
}

/* grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  max-width: 900px;
  margin: 30px auto;
  padding: 10px;
}

.card {
  background: rgba(30,30,30,0.8);
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
  background: rgba(50,50,50,0.9);
}
</style>
</head>

<body>

<!-- ⭐ STAR BACKGROUND -->
<canvas id="space"></canvas>

<header>games</header>

<div class="grid" id="grid"></div>

<script src="../space.js"></script>
<script src="manifest.js"></script>

<script>
const grid = document.getElementById("grid");

window.GAME_LIST.forEach(game => {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = "🎮 " + game.title;
  card.onclick = () => location.href = game.file;
  grid.appendChild(card);
});
</script>

</body>
</html>
