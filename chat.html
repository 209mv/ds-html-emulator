<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>chat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0f;
  color: white;
}

.app {
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 220px;
  background: #111;
  padding: 10px;
  overflow-y: auto;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#chatbox {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  margin: 6px 0;
  padding: 10px;
  background: #1e1e22;
  border-radius: 10px;
}

.input-area {
  display: flex;
  padding: 10px;
  background: #111;
}

.input-area input {
  flex: 1;
  padding: 10px;
}

#replyBar {
  background: #222;
  padding: 5px;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="app">

  <div class="sidebar">
    <h3>Online</h3>
    <div id="users"></div>
  </div>

  <div class="main">

    <div id="chatbox"></div>

    <div id="replyBar" style="display:none;">
      Replying to: <span id="replyText"></span>
      <button onclick="clearReply()">x</button>
    </div>

    <div class="input-area">
      <input id="msgInput" placeholder="message...">
      <button onclick="sendMsg()">send</button>
    </div>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getDatabase, ref, push, onValue, set, get,
  query, limitToLast
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "mauricio-chat.firebaseapp.com",
  databaseURL: "https://mauricio-chat-default-rtdb.firebaseio.com",
  projectId: "mauricio-chat"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const messagesRef = ref(db, "messages");
const usersRef = ref(db, "users");

/* =========================
   USER PROFILE SYSTEM
========================= */

let userId = localStorage.getItem("userId");

if (!userId) {
  userId = crypto.randomUUID();
  localStorage.setItem("userId", userId);
}

let username = localStorage.getItem("username");
let pfp = localStorage.getItem("pfp");

if (!username) {
  username = prompt("Enter your username:");
  if (!username) username = "User_" + userId.slice(0,5);
  localStorage.setItem("username", username);
}

if (!pfp) {
  pfp = `https://api.dicebear.com/7.x/initials/svg?seed=${username}`;
  localStorage.setItem("pfp", pfp);
}

/* REGISTER USER (NO OVERWRITE) */
const userRef = ref(db, "users/" + userId);

get(userRef).then(snap => {
  if (!snap.exists()) {
    set(userRef, {
      name: username,
      pfp,
      role: "user",
      muted: false,
      banned: false
    });
  }
});

/* STATE */
let replyTarget = null;
let isMuted = false;

/* WATCH USER */
onValue(userRef, snap => {
  const d = snap.val();
  if (!d) return;

  isMuted = d.muted;

  if (d.banned) {
    document.body.innerHTML = "<h1>You are banned</h1>";
  }
});

/* SEND MESSAGE */
window.sendMsg = function () {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();

  if (!text || isMuted) return;

  push(messagesRef, {
    text,
    userId,
    name: username,
    pfp,
    time: Date.now(),
    replyTo: replyTarget,
    reactions: {}
  });

  input.value = "";
  replyTarget = null;
  document.getElementById("replyBar").style.display = "none";
};

/* REPLY */
window.replyToMsg = function(id, text) {
  replyTarget = id;
  document.getElementById("replyBar").style.display = "block";
  document.getElementById("replyText").textContent = text;
};

window.clearReply = function() {
  replyTarget = null;
  document.getElementById("replyBar").style.display = "none";
};

/* REACTIONS */
window.react = function(id, emoji) {
  const path = ref(db, `messages/${id}/reactions/${emoji}/${userId}`);
  get(path).then(snap => {
    set(path, snap.exists() ? null : true);
  });
};

/* RENDER MESSAGES */
onValue(query(messagesRef, limitToLast(50)), snap => {
  const box = document.getElementById("chatbox");
  box.innerHTML = "";

  snap.forEach(c => {
    const m = c.val();
    const id = c.key;

    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
      <div style="display:flex; gap:10px;">
        <img src="${m.pfp}" style="width:36px;height:36px;border-radius:50%;">
        <div>
          <b>${m.name}</b><br>
          ${m.text}
          <div style="margin-top:5px;">
            <button onclick="react('${id}','👍')">👍</button>
            <button onclick="react('${id}','😂')">😂</button>
            <button onclick="replyToMsg('${id}','${m.text}')">↩</button>
          </div>
        </div>
      </div>
    `;

    box.appendChild(div);
  });
});

/* USERS LIST */
onValue(usersRef, snap => {
  const box = document.getElementById("users");
  box.innerHTML = "";

  snap.forEach(u => {
    const d = u.val();

    const div = document.createElement("div");
    div.style.display = "flex";
    div.style.alignItems = "center";
    div.style.gap = "8px";

    div.innerHTML = `
      <img src="${d.pfp}" style="width:24px;height:24px;border-radius:50%;">
      ${d.name}
    `;

    box.appendChild(div);
  });
});

/* ENTER KEY */
document.getElementById("msgInput").addEventListener("keydown", e => {
  if (e.key === "Enter") sendMsg();
});

</script>

</body>
</html>
