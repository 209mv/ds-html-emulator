<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>chat</title>
<link rel="stylesheet" href="chat.css">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0f;
  color: white;
  overflow: hidden;
}

.app {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: rgba(20,20,20,0.9);
  padding: 10px;
  overflow-y: auto;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* CHAT */
#chatbox {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  background: rgba(40,40,40,0.85);
  margin: 6px;
  padding: 10px;
  border-radius: 10px;
}

/* INPUT */
.input-area {
  display: flex;
  padding: 10px;
  background: rgba(0,0,0,0.6);
}

.input-area input {
  flex: 1;
  padding: 10px;
}

/* REPLY BAR */
#replyBar {
  background: #222;
  padding: 5px;
  font-size: 12px;
}

/* ADMIN PANEL */
#adminPanel {
  position: fixed;
  right: 10px;
  top: 10px;
  background: #111;
  padding: 10px;
  display: none;
  border: 1px solid #333;
}
</style>
</head>

<body>

<div class="app">

  <div class="sidebar">
    <h3>online list ig</h3>
    <div id="users"></div>
  </div>

  <div class="main">

    <div id="chatbox"></div>

    <div id="replyBar" style="display:none;">
      Replying to: <span id="replyText"></span>
      <button onclick="clearReply()">x</button>
    </div>

    <div class="input-area">
      <input id="msgInput" placeholder="message...">
      <button onclick="sendMsg()">send</button>
    </div>

  </div>

</div>

<!-- ADMIN -->
<div id="adminPanel">
  <b>Admin Panel</b><br>
  <button onclick="banUser()">ban</button>
  <button onclick="unbanUser()">unban</button>
  <button onclick="muteUser()">mute</button>
  <button onclick="setRole()">role</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getDatabase, ref, push, onValue, set, get,
  query, limitToLast
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "mauricio-chat.firebaseapp.com",
  databaseURL: "https://mauricio-chat-default-rtdb.firebaseio.com",
  projectId: "mauricio-chat",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const messagesRef = ref(db, "messages");
const usersRef = ref(db, "users");

/* IDENTITY */
let userId = localStorage.getItem("userId");
if (!userId) {
  userId = crypto.randomUUID();
  localStorage.setItem("userId", userId);
}

const username = "User_" + userId.slice(0,5);
const color = `hsl(${Math.random()*360},70%,60%)`;

/* REGISTER USER */
const userRef = ref(db, "users/" + userId);

set(userRef, {
  name: username,
  color,
  role: "user",
  muted: false,
  banned: false
});

/* STATE */
let replyTarget = null;
let isMuted = false;
let isAdmin = false;

/* WATCH USER */
onValue(userRef, (snap) => {
  const d = snap.val();
  if (!d) return;

  isMuted = d.muted;
  isAdmin = d.role === "admin";

  if (d.banned) {
    document.body.innerHTML = "<h1>You are banned</h1>";
  }

  if (isAdmin) {
    document.getElementById("adminPanel").style.display = "block";
  }
});

/* SEND MESSAGE */
window.sendMsg = function () {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if (!text || isMuted) return;

  push(messagesRef, {
    text,
    userId,
    name: username,
    color,
    time: Date.now(),
    replyTo: replyTarget,
    reactions: {}
  });

  replyTarget = null;
  document.getElementById("replyBar").style.display = "none";
  input.value = "";
};

/* REPLY */
window.replyToMsg = function(id, text) {
  replyTarget = id;
  document.getElementById("replyBar").style.display = "block";
  document.getElementById("replyText").textContent = text;
};

window.clearReply = function() {
  replyTarget = null;
  document.getElementById("replyBar").style.display = "none";
};

/* REACTIONS */
window.react = function(id, emoji) {
  const path = ref(db, `messages/${id}/reactions/${emoji}/${userId}`);
  get(path).then(snap => {
    set(path, snap.exists() ? null : true);
  });
};

/* RENDER */
onValue(query(messagesRef, limitToLast(50)), (snap) => {
  const box = document.getElementById("chatbox");
  box.innerHTML = "";

  snap.forEach(c => {
    const m = c.val();
    const id = c.key;

    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
      <b style="color:${m.color}">${m.name}</b><br>
      ${m.text}<br>

      <button onclick="react('${id}','👍')">👍</button>
      <button onclick="react('${id}','😂')">😂</button>
      <button onclick="replyToMsg('${id}','${m.text}')">↩</button>
    `;

    box.appendChild(div);
  });
});

/* USERS */
onValue(usersRef, (snap) => {
  const box = document.getElementById("users");
  box.innerHTML = "";

  snap.forEach(u => {
    const d = u.val();
    const div = document.createElement("div");
    div.textContent = d.name;
    div.style.color = d.color;
    box.appendChild(div);
  });
});

/* ADMIN */
window.banUser = function() {
  const id = prompt("userId:");
  set(ref(db,"users/"+id+"/banned"), true);
};

window.unbanUser = function() {
  const id = prompt("userId:");
  set(ref(db,"users/"+id+"/banned"), false);
};

window.muteUser = function() {
  const id = prompt("userId:");
  set(ref(db,"users/"+id+"/muted"), true);
};

window.setRole = function() {
  const id = prompt("userId:");
  const role = prompt("role:");
  set(ref(db,"users/"+id+"/role"), role);
};

/* ENTER SEND */
document.getElementById("msgInput").addEventListener("keydown",(e)=>{
  if (e.key === "Enter") sendMsg();
});

/* NOTIFICATIONS */
Notification.requestPermission();

function notify(msg){
  if(Notification.permission==="granted"){
    new Notification(msg);
  }
}

</script>

</body>
</html>
