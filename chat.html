<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>chat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
}

#chatbox {
  height: 80vh;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  padding: 6px;
  border-bottom: 1px solid #333;
}

input {
  width: 75%;
  padding: 10px;
  margin: 10px;
  border: none;
  border-radius: 6px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #444;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #666;
}
</style>
</head>

<body>

<h2 style="text-align:center;">chat</h2>

<div id="chatbox"></div>

<input id="msgInput" placeholder="message...">
<button onclick="sendMsg()">send</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, push, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

/* 🔹 Firebase config */
const firebaseConfig = {
  apiKey: "AIzaSyAWAr4IjoChfFSojPdXMM9s1tCvF5kT3Mo",
  authDomain: "mauricio-chat.firebaseapp.com",
  databaseURL: "https://mauricio-chat-default-rtdb.firebaseio.com",
  projectId: "mauricio-chat",
  storageBucket: "mauricio-chat.firebasestorage.app",
  messagingSenderId: "845502642014",
  appId: "1:845502642014:web:9d0df697c8d85c65ac41cf"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const messagesRef = ref(db, "messages");
const chatQuery = query(messagesRef, limitToLast(50));

/* 🔹 USERNAME */
let username = localStorage.getItem("username");
if (!username) {
  username = prompt("enter username") || "anon";
  localStorage.setItem("username", username);
}

/* 🔹 COLOR */
const colors = ["#ff4a4a", "#4aff88", "#4aa3ff", "#ffb84a", "#d24aff"];
let color = localStorage.getItem("color");

if (!color) {
  color = colors[Math.floor(Math.random() * colors.length)];
  localStorage.setItem("color", color);
}

/* 🔹 ANTI-SPAM */
let lastSend = 0;
const COOLDOWN = 1500;

/* 🔹 RECEIVE */
onValue(chatQuery, (snapshot) => {
  const box = document.getElementById("chatbox");
  box.innerHTML = "";

  snapshot.forEach(child => {
    const msg = child.val();

    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
      <span style="color:${msg.color}; font-weight:bold;">
        ${msg.name}:
      </span>
      ${msg.text}
    `;

    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
});

/* 🔹 SEND */
window.sendMsg = function () {
  const now = Date.now();
  if (now - lastSend < COOLDOWN) return;

  const input = document.getElementById("msgInput");
  if (!input.value.trim()) return;

  push(messagesRef, {
    text: input.value.slice(0, 200),
    name: username,
    color: color,
    time: now
  });

  input.value = "";
  lastSend = now;
};
</script>

</body>
</html>
