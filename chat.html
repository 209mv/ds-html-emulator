<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>chat</title>
<link rel="stylesheet" href="chat.css">
</head>

<body>

<canvas id="space"></canvas>

<div class="app">

  <div class="sidebar">
    <h3>online</h3>
    <div id="users"></div>
  </div>

  <div class="main">
    <div id="chatbox"></div>

    <div class="input-area">
      <input id="msgInput" placeholder="message...">
      <button onclick="sendMsg()">send</button>
    </div>
  </div>

</div>

<!-- admin panel -->
<div id="adminPanel" style="display:none;">
  <b>admin panel</b><br>
  <button onclick="clearChat()">clear chat</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getDatabase, ref, push, onValue,
  set, query, limitToLast
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

/* firebase */
const firebaseConfig = {
  apiKey: "AIzaSyAWAr4IjoChfFSojPdXMM9tCvF5kT3Mo",
  authDomain: "mauricio-chat.firebaseapp.com",
  databaseURL: "https://mauricio-chat-default-rtdb.firebaseio.com",
  projectId: "mauricio-chat",
  storageBucket: "mauricio-chat.firebasestorage.app",
  messagingSenderId: "845502642014",
  appId: "1:845502642014:web:9d0df697c8d85c65ac41cf"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const messagesRef = ref(db, "messages");
const usersRef = ref(db, "users");

/* identity */
let username = localStorage.getItem("username") || prompt("username");
localStorage.setItem("username", username);

/* profile */
const pfp = localStorage.getItem("pfp") ||
  prompt("profile picture URL (optional)") || "";

localStorage.setItem("pfp", pfp);

/* role system */
let role = "user";

const userRef = ref(db, "users/" + username);

set(userRef, {
  name: username,
  pfp: pfp,
  role: "user"
});

/* admin login */
let isAdmin = false;
const key = prompt("admin key (optional)");

if (key === "1234") {
  isAdmin = true;
  document.getElementById("adminPanel").style.display = "block";
}

/* send message */
window.sendMsg = function () {
  const input = document.getElementById("msgInput");
  if (!input.value.trim()) return;

  push(messagesRef, {
    text: input.value,
    name: username,
    pfp: pfp,
    time: Date.now()
  });

  input.value = "";
};

/* receive messages */
onValue(query(messagesRef, limitToLast(50)), (snap) => {
  const box = document.getElementById("chatbox");
  box.innerHTML = "";

  snap.forEach(c => {
    const msg = c.val();

    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
      <img src="${msg.pfp || ''}"
           style="width:22px;height:22px;border-radius:50%;vertical-align:middle;margin-right:5px;">

      <b>${msg.name}:</b> ${msg.text}
    `;

    box.appendChild(div);
  });
});

/* users */
onValue(usersRef, (snap) => {
  const box = document.getElementById("users");
  box.innerHTML = "";

  snap.forEach(u => {
    const data = u.val();
    let badge = "";

    if (data.role === "admin") badge = "👑";
    if (data.role === "mod") badge = "🛡";

    box.innerHTML += `<div>${badge} ${data.name}</div>`;
  });
});

/* enter key */
document.getElementById("msgInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendMsg();
});

/* admin */
window.clearChat = function () {
  if (!isAdmin) return;
  set(messagesRef, null);
};
</script>

<script src="space.js"></script>
</body>
</html>
