<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>emulators</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: black;
}

header {
  text-align: center;
  font-size: 28px;
  padding: 20px;
  text-transform: lowercase;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  max-width: 900px;
  margin: 30px auto;
  padding: 10px;
}

.card {
  background: rgba(30,30,30,0.8);
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
  background: rgba(50,50,50,0.9);
}
</style>
</head>

<body>

<header>emulators</header>

<div class="grid">

  <div class="card" onclick="location.href='dsemulator.html'">
    🎮 ds emulator
  </div>

</div>

</body>
</html>
